services:
  agent:
    build: .
    container_name: moonraker-agent
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    shm_size: "2gb"
    mem_limit: 4g
    memswap_limit: 5g
    volumes:
      - agent-data:/app/data
      # Persistent Chromium profiles for SQSP/WP admin flows, keyed on
      # workspace_credentials.id. Backed up nightly to Hetzner Storage Box
      # via /usr/local/bin/backup-profiles.sh (runs as root on host).
      # Host dir /data/profiles must be owned by uid 1000 (appuser) so the
      # non-root container can write persistent context data.
      - /data/profiles:/data/profiles
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Compose-level healthcheck mirrors the Dockerfile HEALTHCHECK so `docker
    # ps` reflects health on both daemon restart and fresh `docker compose up`.
    # Honors the Dockerfile's CMD via `test: ["CMD-SHELL", ...]` wrapper.
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=5); sys.exit(0 if r.status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

volumes:
  agent-data:
