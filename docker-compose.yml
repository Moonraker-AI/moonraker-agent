services:
  agent:
    build: .
    container_name: moonraker-agent
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    shm_size: "2gb"
    mem_limit: 4g
    memswap_limit: 5g
    volumes:
      - agent-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  agent-data:
